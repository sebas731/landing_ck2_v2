<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libro de reclamaciones | Sientate</title>
  <meta name="description" content="Libro de reclamaciones virtual de ComuniK2 conforme al Código de Protección y Defensa del Consumidor del Perú.">
  <meta name="theme-color" content="#CC0000">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/producto.css">
  <link rel="icon" href="../images/logo.png">
</head>
<body>
  <div id="site-header"></div>

  <header class="page-hero">
    <div class="container">
      <h1><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-5px" aria-hidden="true"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h6"/></svg> Libro de reclamaciones</h1>
      <p>Conforme al Código de Protección y Defensa del Consumidor (Ley N.° 29571).</p>
    </div>
  </header>

  <main class="container prose">
    <p>Completa este formulario para registrar una queja o reclamo. Recibirás una copia y nuestra respuesta en un plazo máximo de 15 días hábiles.</p>

    <form id="reclamo-form" action="https://api.web3forms.com/submit" method="POST" style="margin-top:24px">
      <input type="hidden" name="access_key" value="TU_ACCESS_KEY_DE_WEB3FORMS">
      <input type="hidden" name="subject" value="Nuevo reclamo - Libro de Reclamaciones ComuniK2">
      <input type="hidden" name="from_name" value="Libro de Reclamaciones ComuniK2">
      <input type="checkbox" name="botcheck" class="sr-only" style="display:none" aria-hidden="true">

      <div class="form-field">
        <label for="r-name">Nombre completo</label>
        <input type="text" id="r-name" name="nombre" required>
      </div>
      <div class="form-field">
        <label for="r-doc">DNI / Documento</label>
        <input type="text" id="r-doc" name="documento" required>
      </div>
      <div class="form-field">
        <label for="r-email">Email</label>
        <input type="email" id="r-email" name="email" required>
      </div>
      <div class="form-field">
        <label for="r-phone">Teléfono</label>
        <input type="tel" id="r-phone" name="telefono" required>
      </div>
      <div class="form-field">
        <label for="r-type">Tipo</label>
        <select id="r-type" name="tipo" style="width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:8px">
          <option value="Reclamo">Reclamo (disconformidad con el producto/servicio)</option>
          <option value="Queja">Queja (malestar respecto a la atención)</option>
        </select>
      </div>
      <div class="form-field">
        <label for="r-detail">Detalle del reclamo</label>
        <textarea id="r-detail" name="detalle" required placeholder="Describe lo ocurrido con el mayor detalle posible"></textarea>
      </div>
      <div class="form-field">
        <label for="r-request">Pedido del consumidor</label>
        <textarea id="r-request" name="pedido" required placeholder="¿Qué solución esperas?"></textarea>
      </div>
      <button type="submit" class="btn btn-red btn-block">Enviar reclamo</button>
      <p class="form-status" id="reclamo-status"></p>
    </form>
  </main>

  <div id="site-footer"></div>
  <script src="../js/components.js"></script>
  <script>
    (function () {
      var form = document.getElementById('reclamo-form');
      var status = document.getElementById('reclamo-status');
      if (!form) return;
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        status.style.color = 'var(--gray-500)';
        status.textContent = 'Enviando...';
        fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(form) })
          .then(function (r) { return r.json(); })
          .then(function (res) {
            if (res.success) {
              status.style.color = 'var(--green-wa)';
              status.innerHTML = '<svg class="ico-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Reclamo registrado. Te enviaremos una copia a tu correo.';
              form.reset();
            } else {
              status.style.color = 'var(--red)';
              status.innerHTML = '<svg class="ico-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> ';
              status.appendChild(document.createTextNode(res.message || 'No se pudo enviar.'));
            }
          })
          .catch(function () {
            status.style.color = 'var(--red)';
            status.innerHTML = '<svg class="ico-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Error de conexión. Escríbenos por WhatsApp.';
          });
      });
    })();
  </script>
</body>
</html>
